syntax = "proto3";

package homerobot;

// Represents a single point from a Lidar scan
message LidarPoint {
  float distance_mm = 1;
  float angle_deg = 2;
  uint32 quality = 3;
  bool scan_completed = 4;
}

// A collection of Lidar points
message LidarScan {
  repeated LidarPoint points = 1;
}

// Standard 3D vector for IMU data
message Vector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

// IMU sensor data including acceleration, gyroscope, and optionally magnetometer
message ImuData {
  Vector3 acceleration = 1;
  Vector3 gyroscope = 2;
  optional Vector3 magnetometer = 3;
}

// Battery status information
message BatteryStatus {
  uint32 percentage = 1;
  uint32 voltage_mv = 2;
  uint32 raw_value = 3;
}

// Encoder values from both motors
message MotorEncoders {
  int32 left_encoder = 1;
  int32 right_encoder = 2;
}

// PID configuration for a single motor
message MotorPidConfig {
  float kp = 1;
  float ki = 2;
  float kd = 3;
  uint32 max_speed = 4;
}

// Full robot configuration state
message RobotConfig {
  MotorPidConfig left_motor = 1;
  MotorPidConfig right_motor = 2;
  float lidar_frequency = 3;
}

// Empty message for parameterless RPCs
message Empty {}

// Results of a single diagnostic check
message DiagnosticCheck {
  string name = 1;
  bool success = 2;
  string message = 3;
}

// Summary of the full diagnostic run
message DiagnosticResult {
  bool all_ok = 1;
  repeated DiagnosticCheck checks = 2;
}

// RPC Envelope for sending requests to the Robot
message RpcRequest {
  uint32 call_id = 1;
  string method = 2;       // e.g., "RunDiagnostic"
  bytes payload = 3;       // Serialized request parameters
}

// RPC Envelope for returning results to the Server
message RpcResponse {
  uint32 call_id = 1;
  bytes payload = 2;       // Serialized response message
  string error = 3;        // Error string if the call failed
}

service RobotService {
  rpc RunDiagnostic(Empty) returns (DiagnosticResult);
}

// Command to move the motors
message MotorMoveCommand {
  uint32 left_power = 1;
  float left_angle = 2;
  uint32 right_power = 3;
  float right_angle = 4;
}

// Command to control the Lidar
message LidarControlCommand {
  float target_frequency_hz = 1;
  bool active = 2;
}

// Wrapper message for data sent from the Robot (ESP32) to the Server
message RobotToServerMessage {
  uint32 sequence_millis = 1;
  oneof payload {
    LidarScan lidar = 2;
    ImuData imu = 3;
    BatteryStatus battery = 4;
    MotorEncoders encoders = 5;
    RobotConfig config = 6;
    bool heartbeat = 7;
    RpcResponse rpc_response = 8;
  }
}

// Wrapper message for data sent from the Server to the Robot (ESP32)
message ServerToRobotMessage {
  uint32 sequence_millis = 1;
  oneof payload {
    MotorMoveCommand motor_move = 2;
    RobotConfig motor_config = 3;
    LidarControlCommand lidar_control = 4;
    bool stop_all = 5;
    bool request_data = 6;
    RpcRequest rpc_request = 7;
  }
}
