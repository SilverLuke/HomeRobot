# Zephyr configuration for LED Application
# This configuration supports both ESP32 C6 and S3 DevKit boards

# Enable logging
CONFIG_LOG=y
# Use Immediate mode to see logs as they happen
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y

# Enable Console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y

# Give the USB host time to connect (not needed for UART but safe)
CONFIG_BOOT_DELAY=1500

# Enable standard ESP32 UART
CONFIG_SERIAL=y
CONFIG_UART_ESP32=y

# Support for ESP32/C6/S3 Built-in USB-Serial/JTAG controller (can stay enabled)
CONFIG_SERIAL_ESP32_USB=y

# Enable GPIO driver
CONFIG_GPIO=y

# Enable custom RMT TX driver
CONFIG_RMT_TX=y
CONFIG_RMT_TX_ESP32=y
CONFIG_RMT_TX_LOG_LEVEL_DBG=y

# Initialization priorities: Parent MUST be lower than Child
CONFIG_RMT_TX_INIT_PRIORITY=80
CONFIG_RMT_TX_CHANNEL_INIT_PRIORITY=90

# Increase main stack size for safety
CONFIG_MAIN_STACK_SIZE=4096
