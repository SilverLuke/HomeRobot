# General config
CONFIG_NEWLIB_LIBC=y
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_FPU=n

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IPV4=y

CONFIG_NET_DHCPV4=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y

# Set Static IP details
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.199.123"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.168.199.254"

# Sensors
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_BMI160=y
CONFIG_BMI160_TRIGGER_NONE=y

# Peripherals
CONFIG_PWM=y
CONFIG_GPIO=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_ADC=y
CONFIG_PCNT_ESP32=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y

# Remote Syslog
CONFIG_LOG_BACKEND_NET=y
CONFIG_LOG_BACKEND_NET_SYSLOG=y
CONFIG_LOG_BACKEND_NET_SERVER="192.168.199.120"
CONFIG_LOG_BACKEND_NET_MAX_BUF_SIZE=128

# OTA Updates (MCUmgr)
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UDP=y
CONFIG_MCUMGR_TRANSPORT_UDP_IPV4=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_IMG_STATUS_HOOKS=y

# Bootloader & Flash Management for OTA
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=y
CONFIG_IMG_MANAGER=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y

# Protobuf (nanopb)
CONFIG_NANOPB=y
